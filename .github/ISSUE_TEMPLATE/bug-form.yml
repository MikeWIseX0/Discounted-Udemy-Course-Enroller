name: Bug Report
description: Report a bug, error, or unexpected behavior in DUCE.
assignees: techtanic
title: "[Bug]: "
labels: ["Type: Bug", "Status: TBC"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this bug! Please provide as much detail as possible to help us resolve the issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: |
        Describe the issue you encountered and what you expected to happen.
        You can drag and drop images or screenshots directly here.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: dropdown
    id: enroller
    attributes:
      label: Client Type
      description: Which client version of DUCE did you use when encountering this issue?
      options:
        - GUI
        - CLI
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Choose the operating system you are running.
      options:
        - Windows
        - Linux-Distro
        - MacOS
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Upload Log File (`duce_debug.log`)
      description: |
        Please paste or drag and drop the contents of your `duce_debug.log` file from the application folder.
      placeholder: Paste the relevant log contents here.

  - type: checkboxes
    id: terms
    attributes:
      label: Verification
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/techtanic/Discounted-Udemy-Course-Enroller/blob/master/CODE_OF_CONDUCT.md).
      options:
        - label: I am using the latest version of DUCE.
          required: true
